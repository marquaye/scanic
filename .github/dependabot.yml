version: 2
updates:
  # Keep GitHub Actions up to date (this is what caused the Node 20 deprecation surprise).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"

  # Keep npm dependencies current.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore"
    groups:
      dev-dependencies:
        dependency-type: "development"
