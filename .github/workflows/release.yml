name: Release and Publish

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      
    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version: '20'
        registry-url: 'https://registry.npmjs.org'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Build WASM module
      run: |
        docker compose -f dev/docker-compose.yml up --build
        sudo chown -R "$(id -u):$(id -g)" wasm_blur/pkg
        node scripts/postprocess-wasm.mjs

    - name: Build project
      run: npm run build

    - name: Validate NPM publish access
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      run: |
        if [ -z "$NODE_AUTH_TOKEN" ]; then
          echo "::error::Missing NPM_TOKEN secret. Add an npm automation token with publish access."
          exit 1
        fi

        NPM_USER="$(npm whoami 2>/dev/null || true)"
        if [ -z "$NPM_USER" ]; then
          echo "::error::NPM_TOKEN is invalid, expired, or lacks publish permissions."
          exit 1
        fi

        echo "Using npm account: $NPM_USER"
        if npm view scanic version >/dev/null 2>&1; then
          if ! npm owner ls scanic | awk '{print $1}' | grep -qx "$NPM_USER"; then
            echo "::error::npm account '$NPM_USER' is not an owner of package 'scanic'."
            echo "::error::Run: npm owner add $NPM_USER scanic"
            exit 1
          fi
        fi

    - name: Publish to NPM
      run: npm publish --access public
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ github.ref_name }}
        name: Release ${{ github.ref_name }}
        body: |
          ## Installation
          
          ```bash
          npm install scanic@${{ github.ref_name }}
          ```
          
          Or use via CDN:
          ```html
          <script src="https://unpkg.com/scanic@${{ github.ref_name }}/dist/scanic.js"></script>
          ```
        draft: false
        prerelease: false

    # GitHub Pages is deployed by the "Deploy Docs" workflow, which runs on the
    # accompanying push to main. Deploying here too would race it on the gh-pages
    # branch, so this workflow only handles npm publish + the GitHub release.
